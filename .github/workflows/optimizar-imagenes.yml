name: Optimizar imágenes y videos automáticamente

on:
  push:
    paths:
      - 'raw/**'

jobs:
  optimize:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Instalar herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp ffmpeg
      
      - name: Optimizar imágenes a WebP
        run: |
          mkdir -p assets/optimizadas
          for img in raw/*.{jpg,jpeg,png,gif,JPG,JPEG,PNG,GIF}; do
            if [ -f "$img" ]; then
              nombre=$(basename "$img" | sed 's/\.[^.]*$//')
              convert "$img" -resize 1920x1080 -quality 85 "assets/optimizadas/${nombre}.webp" && \
              echo "✅ Imagen optimizada: ${nombre}.webp" || \
              echo "❌ Error optimizando imagen: ${nombre}"
            fi
          done
      
      - name: Optimizar videos a MP4 (con manejo de errores)
        run: |
          for video in raw/*.{mp4,mov,avi,MOV,MP4,AVI}; do
            if [ -f "$video" ]; then
              nombre=$(basename "$video" | sed 's/\.[^.]*$//')
              if ffmpeg -i "$video" -vf "scale=1280:-2" -c:v libx264 -crf 28 -preset fast "assets/optimizadas/${nombre}.mp4" 2>/dev/null; then
                echo "✅ Video optimizado: ${nombre}.mp4"
              else
                echo "⚠️ Error optimizando video: ${nombre} (formato no soportado o archivo corrupto)"
              fi
            fi
          done
      
      - name: Subir archivos a Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          for file in assets/optimizadas/*; do
            if [ -f "$file" ]; then
              nombre=$(basename "$file")
              curl -X POST \
                -H "apikey: $SUPABASE_SERVICE_KEY" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
                -H "Content-Type: $(file -b --mime-type "$file")" \
                --data-binary "@$file" \
               "$SUPABASE_URL/storage/v1/object/clientes/20640a4e-ebeb-4149-b937-ecc34fa3038a/$nombre"
              echo "✅ Subido: $nombre" || \
              echo "❌ Error subiendo: $nombre"
            fi
          done
      
      - name: Limpiar archivos temporales
        run: |
          rm -rf assets/optimizadas
          echo "✅ Archivos temporales eliminados"
