name: Optimizar imágenes y subir a Supabase

on:
  push:
    paths:
      - 'raw/**'  # Se activa cuando subes algo a la carpeta raw

jobs:
  optimize-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Instalar herramientas de optimización
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp
      
      - name: Optimizar imágenes a WebP
        run: |
          mkdir -p assets/optimizadas
          for img in raw/*.{jpg,jpeg,png,gif,JPG,JPEG,PNG,GIF}; do
            if [ -f "$img" ]; then
              nombre=$(basename "$img" | sed 's/\.[^.]*$//')
              convert "$img" -resize 1920x1080 -quality 85 "assets/optimizadas/${nombre}.webp"
              echo "✅ Optimizada: ${nombre}.webp"
            fi
          done
      
      - name: Subir imágenes a Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          for img in assets/optimizadas/*.webp; do
            if [ -f "$img" ]; then
              nombre=$(basename "$img")
              curl -X POST \
                -H "apikey: $SUPABASE_KEY" \
                -H "Authorization: Bearer $SUPABASE_KEY" \
                -H "Content-Type: image/webp" \
                --data-binary "@$img" \
                "$SUPABASE_URL/storage/v1/object/clientes/${{ github.event.repository.name }}/$nombre"
              echo "✅ Subida: $nombre"
            fi
          done
      
      - name: Limpiar archivos temporales
        run: |
          rm -rf raw/*
          rm -rf assets/optimizadas
          echo "✅ Archivos temporales eliminados"
      
      - name: Commit y push de cambios (limpiar raw)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/
          git commit -m "Limpiar carpeta raw después de optimización" || echo "No hay cambios"
          git push
