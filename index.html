<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Cargando...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            background-color: #F0F8FF;
        }
        h1, h2, h3, .logo, .hero-principal { font-family: 'Space Grotesk', monospace; font-weight: 600; letter-spacing: -0.02em; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; width: 100%; }
        
        .site-header {
            background-color: #1E3A5F;
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .header-spacer { flex: 1; }
        .menu-toggle {
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-nav ul { display: flex; gap: 2rem; list-style: none; }
        .main-nav a { color: white; text-decoration: none; padding: 0.5rem 0; border-bottom: 2px solid transparent; transition: all 0.3s; cursor: pointer; }
        .main-nav a:hover, .main-nav a.activo { border-bottom-color: #4A90E2; }
        
        @media (max-width: 992px) {
            .main-nav ul {
                display: none;
                position: absolute;
                top: 100%;
                right: 0;
                background-color: #1E3A5F;
                flex-direction: column;
                padding: 1rem;
                gap: 0.5rem;
                min-width: 280px;
                border-radius: 8px;
            }
            .main-nav ul.active { display: flex; }
            .main-nav a { display: block; padding: 0.5rem 1rem; border-bottom: none; }
        }
        
        .seccion { display: none; padding: 4rem 0; }
        .seccion.activa { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 0.5rem; position: relative; padding-bottom: 1rem; }
        .section-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 3px; border-radius: 3px; }
        .section-subtitle { text-align: center; opacity: 0.8; margin-bottom: 3rem; font-size: 1.1rem; max-width: 700px; margin-left: auto; margin-right: auto; }
        
        .hero {
            position: relative;
            width: 100%;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        #heroMedia {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            max-width: 800px;
            padding: 20px;
        }
        .hero-superior { font-size: 1.2rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.5rem; }
        .hero-principal { font-size: 4rem; font-weight: 700; margin-bottom: 0.5rem; }
        .hero-inferior { font-size: 1.2rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 2rem; }
        .hero-cta { display: inline-block; padding: 1rem 2rem; border-radius: 50px; font-weight: bold; transition: all 0.3s; cursor: pointer; text-decoration: none; color: white; }
        .hero-cta:hover { transform: translateY(-3px); }
        
        .productos-grid, .servicios-grid, .testimonios-grid, .galeria-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(4, 1fr);
        }
        @media (max-width: 1199px) { .productos-grid, .servicios-grid, .testimonios-grid, .galeria-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 767px) { .productos-grid, .servicios-grid, .testimonios-grid, .galeria-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 479px) { .productos-grid, .servicios-grid, .testimonios-grid, .galeria-grid { grid-template-columns: 1fr; } }
        
        .producto-card, .servicio-card, .testimonio-card, .galeria-item {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .producto-card:hover, .servicio-card:hover, .testimonio-card:hover, .galeria-item:hover { transform: translateY(-5px); }
        .producto-img { position: relative; height: 220px; overflow: hidden; }
        .producto-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .producto-card:hover .producto-img img { transform: scale(1.1); }
        .producto-badge { position: absolute; top: 15px; left: 15px; padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.8rem; font-weight: 600; color: white; }
        .producto-content { padding: 1.5rem; }
        .producto-content h3 { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .producto-desc { margin-bottom: 1rem; }
        .producto-features { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .producto-features span { background: #f0f0f0; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.8rem; }
        .producto-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f0f0f0; padding-top: 1rem; }
        .precio { font-size: 1.5rem; font-weight: bold; }
        .btn-solicitar { padding: 0.6rem 1.2rem; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; color: white; }
        .servicio-card { text-align: center; padding: 2rem; }
        .servicio-icono { font-size: 3rem; margin-bottom: 1rem; }
        .servicio-horario { display: inline-block; background: #f0f0f0; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.8rem; margin-top: 1rem; }
        .testimonio-card { padding: 2rem; position: relative; }
        .testimonio-card::before { content: '"'; position: absolute; top: -10px; left: 20px; font-size: 5rem; opacity: 0.3; font-family: serif; }
        .testimonio-texto { margin-bottom: 1.5rem; font-style: italic; }
        .testimonio-autor { display: flex; align-items: center; gap: 1rem; border-top: 1px solid #f0f0f0; padding-top: 1rem; }
        .testimonio-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .testimonio-rating { color: #FFD700; }
        .galeria-item { position: relative; aspect-ratio: 4/3; cursor: pointer; }
        .galeria-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .galeria-item:hover img { transform: scale(1.1); }
        .galeria-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: white; padding: 1rem; }
        .btn-ver-mas { background: #4A90E2; border: none; padding: 0.3rem 0.8rem; border-radius: 50px; color: white; cursor: pointer; }
        .nosotros-grid { display: flex; flex-direction: column; gap: 2rem; }
        .nosotros-imagen { width: 100%; height: 400px; border-radius: 16px; overflow: hidden; }
        .nosotros-imagen img { width: 100%; height: 100%; object-fit: cover; }
        .nosotros-historia { font-size: 1.1rem; line-height: 1.8; margin-bottom: 1.5rem; }
        .nosotros-valores { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .valor-item { display: flex; align-items: center; gap: 0.8rem; background: #f8f9fa; padding: 0.8rem 1rem; border-radius: 50px; }
        .contacto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .info-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 1.5rem; border-left: 4px solid; }
        .info-card h3 { margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .redes-sociales { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .red-social { display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .red-social i { width: 45px; height: 45px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: all 0.3s; }
        .red-social:hover i { color: white; }
        .mapa-container { border-radius: 12px; overflow: hidden; height: 400px; }
        .mapa-container iframe { width: 100%; height: 100%; border: 0; }
        .site-footer { padding: 2rem 0; margin-top: 2rem; text-align: center; color: white; }
        .modal-galeria {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
        }
        .modal-contenido { position: relative; width: 90%; max-width: 1200px; height: 90%; margin: auto; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #modal-imagen { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 8px; }
        .modal-info { color: white; text-align: center; margin-top: 2rem; }
        .modal-cerrar { position: absolute; top: 20px; right: 30px; color: white; font-size: 3rem; cursor: pointer; }
        .modal-prev, .modal-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; }
        .modal-prev { left: 20px; }
        .modal-next { right: 20px; }
        .mensaje-revision {
            text-align: center;
            padding: 4rem 2rem;
            background: #f8f9fa;
            border-radius: 16px;
            margin: 2rem;
        }
        .mensaje-revision h2 { color: #0B4F6C; margin-bottom: 1rem; }
        .mensaje-revision p { color: #333; margin-bottom: 1rem; }
        .whatsapp-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 1rem;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .hero-principal { font-size: 2rem; }
            .section-title { font-size: 1.8rem; }
            .contacto-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="site-header"><div class="container"><div class="logo" id="logo">✨ Mi Negocio</div><div class="header-spacer"></div><button class="menu-toggle" id="menuToggle">☰</button><nav class="main-nav"><ul id="mainMenu"><li><a class="menu-link" data-seccion="inicio">Inicio</a></li><li><a class="menu-link" data-seccion="productos">Productos</a></li><li><a class="menu-link" data-seccion="servicios">Servicios</a></li><li><a class="menu-link" data-seccion="nosotros">Nosotros</a></li><li><a class="menu-link" data-seccion="testimonios">Testimonios</a></li><li><a class="menu-link" data-seccion="galeria">Galería</a></li><li><a class="menu-link" data-seccion="contacto">Contacto</a></li></ul></nav></div></header>
    <main>
        <section id="inicio" class="seccion activa">
            <div class="hero" id="hero">
                <div id="heroMedia"></div>
                <div class="hero-overlay"></div>
                <div class="hero-content">
                    <div class="hero-superior" id="hero-superior"></div>
                    <div class="hero-principal" id="hero-principal"></div>
                    <div class="hero-inferior" id="hero-inferior"></div>
                    <a class="hero-cta" id="hero-boton">Ver productos</a>
                </div>
            </div>
        </section>
        <section id="productos" class="seccion"><div class="container"><h2 class="section-title" id="productos-titulo">Nuestros Productos</h2><p class="section-subtitle" id="productos-subtitulo"></p><div class="productos-grid" id="productos-grid"></div></div></section>
        <section id="servicios" class="seccion"><div class="container"><h2 class="section-title" id="servicios-titulo">Nuestros Servicios</h2><p class="section-subtitle" id="servicios-subtitulo"></p><div class="servicios-grid" id="servicios-grid"></div></div></section>
        <section id="nosotros" class="seccion"><div class="container"><h2 class="section-title" id="nosotros-titulo">Sobre Nosotros</h2><p class="section-subtitle" id="nosotros-subtitulo"></p><div class="nosotros-grid"><div class="nosotros-imagen" id="nosotros-imagen"></div><div class="nosotros-contenido" id="nosotros-contenido"></div></div></div></section>
        <section id="testimonios" class="seccion"><div class="container"><h2 class="section-title" id="testimonios-titulo">Lo que dicen nuestros clientes</h2><p class="section-subtitle" id="testimonios-subtitulo"></p><div class="testimonios-grid" id="testimonios-grid"></div></div></section>
        <section id="galeria" class="seccion"><div class="container"><h2 class="section-title" id="galeria-titulo">Galería</h2><p class="section-subtitle" id="galeria-subtitulo"></p><div class="galeria-grid" id="galeria-grid"></div></div></section>
        <section id="contacto" class="seccion"><div class="container"><h2 class="section-title" id="contacto-titulo">Contacto</h2><p class="section-subtitle" id="contacto-subtitulo"></p><div class="contacto-grid"><div class="contacto-info" id="contacto-info"></div><div class="mapa-container" id="mapa-container"></div></div></div></section>
    </main>
    <footer class="site-footer" id="site-footer"><div class="container"><p id="footer-texto">© 2025 Mi Negocio</p></div></footer>
    <div class="modal-galeria" id="modal-galeria"><span class="modal-cerrar">&times;</span><div class="modal-contenido"><img id="modal-imagen" src=""><div class="modal-info"><h3 id="modal-titulo"></h3><p id="modal-descripcion"></p></div><button class="modal-prev" onclick="cambiarImagenGaleria(-1)">❮</button><button class="modal-next" onclick="cambiarImagenGaleria(1)">❯</button></div></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <script>
        // ============================================
        // CREDENCIALES FIJAS
        // ============================================
        const SUPABASE_URL = 'https://nvrcqlxnvjvhznmxozhh.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qCtRLmyJxBbYRcO7Suuqnw_mrmqspp6';
        const BUCKET_NAME = 'cliente';
        
        let negocioConfig = null;
        let negocioId = null;
        let galeriaItems = [];
        let galeriaIndex = 0;
        let galeriaFotos = [];

        const urlParams = new URLSearchParams(window.location.search);
        negocioId = urlParams.get('id');

        if (!negocioId) {
            negocioId = prompt('🔑 Ingresa el ID de tu negocio:');
            if (negocioId) {
                window.location.href = window.location.pathname + '?id=' + negocioId;
            } else {
                document.body.innerHTML = '<div style="text-align:center; padding:4rem"><h1>❌ Se requiere un ID</h1><p>Recarga la página e ingresa el ID de tu negocio.</p></div>';
            }
        } else {
            cargarNegocio();
        }

        function getImagenUrl(nombreArchivo, carpeta = 'galeria') {
            if (!nombreArchivo) return '';
            return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${negocioId}/${carpeta}/${nombreArchivo}`;
        }

        function mostrarMensajeRevision() {
            document.body.innerHTML = `
                <div style="text-align:center; padding:4rem; max-width:600px; margin:0 auto;">
                    <div style="background:white; border-radius:24px; padding:2rem; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
                        <h1 style="color:#0B4F6C;">⏳ Página en revisión</h1>
                        <p style="margin:1rem 0;">Tu página está siendo revisada por nuestro equipo.</p>
                        <p>En los próximos días nos pondremos en contacto contigo para mostrarte las mejoras y ajustar los detalles.</p>
                        <a href="https://wa.me/5358481702" class="whatsapp-btn" target="_blank">
                            <i class="fab fa-whatsapp"></i> ¿Dudas? Escríbenos
                        </a>
                    </div>
                </div>
            `;
        }

        async function cargarNegocio() {
            try {
                const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await supabaseClient
                    .from('negocios')
                    .select('*')
                    .eq('id', negocioId)
                    .single();
                
                if (error) throw error;
                
                if (data.estado !== 'publicado') {
                    mostrarMensajeRevision();
                    return;
                }
                
                negocioConfig = data.config;
                aplicarColores();
                renderizarHero();
                renderizarNosotros();
                await renderizarProductos(supabaseClient);
                await renderizarServicios(supabaseClient);
                await renderizarTestimonios(supabaseClient);
                await renderizarGaleria(supabaseClient);
                renderizarContacto();
                renderizarFooter();
                document.title = negocioConfig.marca.nombre || 'Mi Negocio';
                document.getElementById('logo').textContent = negocioConfig.marca.logo || '✨ ' + (negocioConfig.marca.nombre || 'Mi Negocio');
                iniciarMenu();
            } catch (error) {
                console.error('Error:', error);
                mostrarMensajeRevision();
            }
        }

        function aplicarColores() {
            const colores = negocioConfig.marca.colores;
            const style = document.createElement('style');
            style.textContent = `
                .section-title::after { background: ${colores.secundario}; }
                .hero-cta, .btn-solicitar, .btn-ver-mas { background: ${colores.secundario}; }
                .producto-badge { background: ${colores.acento}; }
                .info-card { border-left-color: ${colores.secundario}; }
                .precio { color: ${colores.secundario}; }
                .servicio-icono, .valor-icono { color: ${colores.secundario}; }
                .site-header, .site-footer { background: ${colores.primario}; }
                body { background-color: ${colores.fondo}; color: ${colores.texto}; }
            `;
            document.head.appendChild(style);
        }

        function renderizarHero() {
            const hero = negocioConfig.hero;
            const heroMedia = document.getElementById('heroMedia');
            
            heroMedia.innerHTML = '';
            
            if (hero.video && hero.video.trim() !== '') {
                const video = document.createElement('video');
                video.autoplay = true;
                video.muted = true;
                video.loop = true;
                video.playsinline = true;
                video.style.cssText = 'position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translate(-50%, -50%); object-fit: cover; z-index: 0;';
                const source = document.createElement('source');
                source.src = getImagenUrl(hero.video, '');
                source.type = 'video/mp4';
                video.appendChild(source);
                heroMedia.appendChild(video);
            } else if (hero.imagen && hero.imagen.trim() !== '') {
                heroMedia.style.backgroundImage = `url(${getImagenUrl(hero.imagen, '')})`;
                heroMedia.style.backgroundSize = 'cover';
                heroMedia.style.backgroundPosition = 'center';
                heroMedia.style.position = 'absolute';
                heroMedia.style.top = '0';
                heroMedia.style.left = '0';
                heroMedia.style.width = '100%';
                heroMedia.style.height = '100%';
                heroMedia.style.zIndex = '0';
            }
            
            document.getElementById('hero-superior').textContent = hero.texto_superior || '';
            document.getElementById('hero-principal').textContent = hero.texto_principal || negocioConfig.marca.nombre || '';
            document.getElementById('hero-inferior').textContent = hero.texto_inferior || '';
            document.getElementById('hero-boton').textContent = hero.boton || 'Ver productos';
            document.getElementById('hero-boton').onclick = () => cambiarSeccion('productos');
        }

        function renderizarNosotros() {
            const nosotros = negocioConfig.nosotros;
            document.getElementById('nosotros-titulo').textContent = nosotros.titulo || 'Sobre Nosotros';
            document.getElementById('nosotros-subtitulo').textContent = nosotros.subtitulo || '';
            const imgContainer = document.getElementById('nosotros-imagen');
            if (nosotros.imagen) imgContainer.innerHTML = `<img src="${getImagenUrl(nosotros.imagen, '')}" alt="Sobre nosotros" loading="lazy">`;
            let valoresHtml = '';
            if (nosotros.valores && nosotros.valores.length) {
                valoresHtml = `<div class="nosotros-valores">${nosotros.valores.map(v => `<div class="valor-item"><span class="valor-icono">✓</span><span>${escapeHtml(v)}</span></div>`).join('')}</div>`;
            }
            document.getElementById('nosotros-contenido').innerHTML = `<div class="nosotros-historia">${escapeHtml(nosotros.historia || '')}</div>${valoresHtml}`;
        }

        async function renderizarProductos(supabaseClient) {
            try {
                const { data: productos } = await supabaseClient
                    .from('productos')
                    .select('*')
                    .eq('negocio_id', negocioId)
                    .eq('disponible', true)
                    .order('orden');
                
                const grid = document.getElementById('productos-grid');
                if (!productos || !productos.length) { 
                    grid.innerHTML = '<p style="text-align:center">No hay productos disponibles</p>'; 
                    return; 
                }
                
                grid.innerHTML = productos.map(p => `
                    <article class="producto-card">
                        <div class="producto-img">
                            <img src="${getImagenUrl(p.imagen, '')}" alt="${escapeHtml(p.nombre)}" loading="lazy" onerror="this.src='https://via.placeholder.com/300'">
                            ${p.badge_permanente ? `<div class="producto-badge">${escapeHtml(p.badge_permanente)}</div>` : ''}
                        </div>
                        <div class="producto-content">
                            <h3>${escapeHtml(p.nombre)}</h3>
                            <p class="producto-desc">${escapeHtml(p.descripcion || '')}</p>
                            <div class="producto-features">${(p.caracteristicas || []).map(c => `<span>${escapeHtml(c)}</span>`).join('')}</div>
                            <div class="producto-footer">
                                <span class="precio">$${p.precio} <small>desde</small></span>
                                <button class="btn-solicitar" onclick="alert('Contáctanos por WhatsApp')">Solicitar</button>
                            </div>
                        </div>
                    </article>
                `).join('');
            } catch (error) { 
                console.error('Error productos:', error); 
            }
        }

        async function renderizarServicios(supabaseClient) {
            try {
                const { data: servicios } = await supabaseClient
                    .from('servicios')
                    .select('*')
                    .eq('negocio_id', negocioId)
                    .order('orden');
                
                const grid = document.getElementById('servicios-grid');
                if (!servicios || !servicios.length) { 
                    grid.innerHTML = '<p style="text-align:center">No hay servicios disponibles</p>'; 
                    return; 
                }
                
                grid.innerHTML = servicios.map(s => `
                    <article class="servicio-card">
                        <div class="servicio-icono">${s.icono || '<i class="fas fa-star"></i>'}</div>
                        <h3>${escapeHtml(s.nombre)}</h3>
                        <p class="servicio-desc">${escapeHtml(s.descripcion || '')}</p>
                        <span class="servicio-horario"><i class="fas fa-clock"></i> ${escapeHtml(s.horario || 'Siempre disponible')}</span>
                    </article>
                `).join('');
            } catch (error) { 
                console.error('Error servicios:', error); 
            }
        }

        async function renderizarTestimonios(supabaseClient) {
            try {
                const { data: testimonios } = await supabaseClient
                    .from('testimonios')
                    .select('*')
                    .eq('negocio_id', negocioId)
                    .order('orden');
                
                const grid = document.getElementById('testimonios-grid');
                if (!testimonios || !testimonios.length) { 
                    grid.innerHTML = '<p style="text-align:center">No hay testimonios aún</p>'; 
                    return; 
                }
                
                grid.innerHTML = testimonios.map(t => `
                    <div class="testimonio-card">
                        <div class="testimonio-texto">"${escapeHtml(t.texto)}"</div>
                        <div class="testimonio-autor">
                            <img class="testimonio-avatar" src="${getImagenUrl(t.avatar, '')}" onerror="this.src='https://randomuser.me/api/portraits/lego/1.jpg'" alt="${escapeHtml(t.nombre)}">
                            <div class="testimonio-info">
                                <h4>${escapeHtml(t.nombre)}</h4>
                                <div class="testimonio-rating">${'★'.repeat(t.rating)}${'☆'.repeat(5-t.rating)}</div>
                                <small>${escapeHtml(t.lugar || '')}</small>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) { 
                console.error('Error testimonios:', error); 
            }
        }

        async function renderizarGaleria(supabaseClient) {
            try {
                const { data: galeria } = await supabaseClient
                    .from('galeria')
                    .select('*')
                    .eq('negocio_id', negocioId)
                    .order('orden');
                
                const grid = document.getElementById('galeria-grid');
                if (!galeria || !galeria.length) { 
                    grid.innerHTML = '<p style="text-align:center">No hay imágenes en la galería</p>'; 
                    return; 
                }
                galeriaItems = galeria;
                grid.innerHTML = galeria.map((item, idx) => `
                    <div class="galeria-item" onclick="abrirModalGaleria(${idx})">
                        <img src="${getImagenUrl(item.imagen_url, 'galeria')}" alt="${escapeHtml(item.titulo)}" loading="lazy" onerror="this.src='https://via.placeholder.com/400'">
                        <div class="galeria-overlay">
                            <h3>${escapeHtml(item.titulo || item.categoria)}</h3>
                            <button class="btn-ver-mas">Ver más</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) { 
                console.error('Error galería:', error); 
            }
        }

        function renderizarContacto() {
            const contacto = negocioConfig.contacto;
            let redesHtml = '';
            if (contacto.redes) {
                if (contacto.redes.facebook) redesHtml += `<a href="${contacto.redes.facebook}" target="_blank" class="red-social"><i class="fab fa-facebook-f"></i><span>Facebook</span></a>`;
                if (contacto.redes.instagram) redesHtml += `<a href="${contacto.redes.instagram}" target="_blank" class="red-social"><i class="fab fa-instagram"></i><span>Instagram</span></a>`;
            }
            if (contacto.whatsapp) redesHtml += `<a href="https://wa.me/${contacto.whatsapp.replace(/[^0-9]/g, '')}" target="_blank" class="red-social"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>`;
            document.getElementById('contacto-info').innerHTML = `
                <div class="info-card"><h3><i class="fas fa-map-marker-alt"></i> Dirección</h3><p>${escapeHtml(contacto.direccion || 'No especificada')}</p></div>
                <div class="info-card"><h3><i class="fas fa-phone"></i> Teléfono</h3><p><a href="tel:${contacto.telefono}">${escapeHtml(contacto.telefono)}</a></p></div>
                <div class="info-card"><h3><i class="fas fa-envelope"></i> Email</h3><p><a href="mailto:${contacto.email}">${escapeHtml(contacto.email)}</a></p></div>
                <div class="info-card"><h3><i class="fas fa-share-alt"></i> Redes Sociales</h3><div class="redes-sociales">${redesHtml || '<p>No hay redes sociales configuradas</p>'}</div></div>
            `;
            const mapaContainer = document.getElementById('mapa-container');
            if (contacto.mapa && contacto.mapa.trim() !== '') {
                mapaContainer.innerHTML = `<iframe src="${contacto.mapa}" allowfullscreen loading="lazy"></iframe>`;
            } else {
                mapaContainer.innerHTML = '<p>No hay mapa disponible</p>';
            }
        }

        function renderizarFooter() {
            document.getElementById('footer-texto').textContent = negocioConfig.footer?.texto || `© ${new Date().getFullYear()} ${negocioConfig.marca.nombre || 'Mi Negocio'} · Todos los derechos reservados`;
            document.getElementById('site-footer').style.backgroundColor = negocioConfig.marca.colores.primario;
        }

        function escapeHtml(str) { 
            if (!str) return ''; 
            return str.replace(/[&<>]/g, m => { 
                if (m === '&') return '&amp;'; 
                if (m === '<') return '&lt;'; 
                if (m === '>') return '&gt;'; 
                return m; 
            }); 
        }

        function iniciarMenu() {
            const menuToggle = document.getElementById('menuToggle');
            const mainMenu = document.getElementById('mainMenu');
            if (menuToggle && mainMenu) {
                menuToggle.addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    mainMenu.classList.toggle('active'); 
                    menuToggle.textContent = mainMenu.classList.contains('active') ? '✕' : '☰'; 
                });
                document.addEventListener('click', (e) => { 
                    if (window.innerWidth <= 992 && mainMenu && menuToggle && !mainMenu.contains(e.target) && !menuToggle.contains(e.target)) { 
                        mainMenu.classList.remove('active'); 
                        menuToggle.textContent = '☰'; 
                    } 
                });
            }
            const menuLinks = document.querySelectorAll('.menu-link');
            const secciones = document.querySelectorAll('.seccion');
            window.cambiarSeccion = function(seccionId) { 
                secciones.forEach(s => s.classList.remove('activa')); 
                document.getElementById(seccionId)?.classList.add('activa'); 
                menuLinks.forEach(link => { 
                    link.classList.remove('activo'); 
                    if (link.dataset.seccion === seccionId) link.classList.add('activo'); 
                }); 
                if (window.innerWidth <= 992 && mainMenu) { 
                    mainMenu.classList.remove('active'); 
                    if (menuToggle) menuToggle.textContent = '☰'; 
                } 
            };
            menuLinks.forEach(link => { 
                link.addEventListener('click', (e) => { 
                    e.preventDefault(); 
                    window.cambiarSeccion(link.dataset.seccion); 
                }); 
            });
            document.getElementById('hero-boton').onclick = () => window.cambiarSeccion('productos');
        }

        function abrirModalGaleria(index) { 
            const item = galeriaItems[index]; 
            if (!item) return; 
            galeriaFotos = [getImagenUrl(item.imagen_url, 'galeria')]; 
            galeriaIndex = 0; 
            document.getElementById('modal-imagen').src = galeriaFotos[0]; 
            document.getElementById('modal-titulo').textContent = item.titulo || item.categoria; 
            document.getElementById('modal-descripcion').textContent = item.descripcion || ''; 
            document.getElementById('modal-galeria').style.display = 'block'; 
        }
        
        function cerrarModalGaleria() { 
            document.getElementById('modal-galeria').style.display = 'none'; 
        }
        
        function cambiarImagenGaleria(direccion) { 
            if (!galeriaFotos) return; 
            galeriaIndex = (galeriaIndex + direccion + galeriaFotos.length) % galeriaFotos.length; 
            document.getElementById('modal-imagen').src = galeriaFotos[galeriaIndex]; 
        }
        
        window.abrirModalGaleria = abrirModalGaleria; 
        window.cambiarImagenGaleria = cambiarImagenGaleria;
        document.querySelector('.modal-cerrar')?.addEventListener('click', cerrarModalGaleria);
        document.getElementById('modal-galeria')?.addEventListener('click', (e) => { 
            if (e.target === document.getElementById('modal-galeria')) cerrarModalGaleria(); 
        });
    </script>
