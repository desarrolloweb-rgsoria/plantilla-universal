name: Optimizar imágenes y videos

on:
  push:
    branches: [ main, master ]

jobs:
  optimize:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Verificar archivos en raw
        run: |
          echo "=== CONTENIDO DE raw/ ==="
          ls -la raw/ || echo "No existe la carpeta raw o está vacía"
          echo "=== FIN ==="
      
      - name: Instalar herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp ffmpeg
      
      - name: Optimizar imágenes a WebP
        run: |
          mkdir -p assets/optimizadas
          for img in raw/*.jpg raw/*.jpeg raw/*.png raw/*.gif raw/*.JPG raw/*.JPEG raw/*.PNG raw/*.GIF; do
            if [ -f "$img" ]; then
              nombre=$(basename "$img" | sed 's/\.[^.]*$//')
              convert "$img" -resize 1920x1080 -quality 85 "assets/optimizadas/${nombre}.webp"
              echo "✅ Optimizada: ${nombre}.webp"
            fi
          done
      
      - name: Optimizar videos a MP4
        run: |
          for video in raw/*.mp4 raw/*.mov raw/*.avi raw/*.MP4 raw/*.MOV raw/*.AVI; do
            if [ -f "$video" ]; then
              nombre=$(basename "$video" | sed 's/\.[^.]*$//')
              ffmpeg -i "$video" -vf "scale=1280:-2" -c:v libx264 -crf 28 -preset fast "assets/optimizadas/${nombre}.mp4" 2>/dev/null && \
              echo "✅ Video optimizado: ${nombre}.mp4" || \
              echo "⚠️ Error en video: ${nombre}"
            fi
          done
      
      - name: Mostrar archivos optimizados
        run: |
          echo "=== ARCHIVOS OPTIMIZADOS ==="
          ls -la assets/optimizadas/ || echo "No se generaron archivos optimizados"
      
      - name: Subir a Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          for file in assets/optimizadas/*; do
            if [ -f "$file" ]; then
              nombre=$(basename "$file")
              curl -X POST \
                -H "apikey: $SUPABASE_SERVICE_KEY" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
                -H "Content-Type: $(file -b --mime-type "$file")" \
                --data-binary "@$file" \
                "$SUPABASE_URL/storage/v1/object/clientes/plantilla-universal/$nombre"
              echo "✅ Subido: $nombre"
            fi
          done
      
      - name: Limpiar archivos temporales
        run: |
          rm -rf assets/optimizadas
          echo "✅ Limpieza completada"
