name: Optimizar imágenes (manual)

on:
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  optimize:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      
      - name: Instalar herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp
      
      - name: Optimizar imágenes a WebP
        run: |
          mkdir -p assets/optimizadas
          for img in raw/*.{jpg,jpeg,png,gif,JPG,JPEG,PNG,GIF}; do
            if [ -f "$img" ]; then
              nombre=$(basename "$img" | sed 's/\.[^.]*$//')
              convert "$img" -resize 1920x1080 -quality 85 "assets/optimizadas/${nombre}.webp"
              echo "✅ Optimizada: ${nombre}.webp"
            fi
          done
      
      - name: Subir a Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          for file in assets/optimizadas/*; do
            if [ -f "$file" ]; then
              nombre=$(basename "$file")
              curl -X POST \
                -H "apikey: $SUPABASE_SERVICE_KEY" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
                -H "Content-Type: $(file -b --mime-type "$file")" \
                --data-binary "@$file" \
                "$SUPABASE_URL/storage/v1/object/clientes/plantilla-universal/$nombre"
              echo "✅ Subido: $nombre"
            fi
          done
      
      - name: Limpiar
        run: rm -rf assets/optimizadas
